x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:fblanco123@postgres:5432/datawarehouse
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW_UID: 50000
    AIRFLOW_CONN_SPARK_DEFAULT: spark://spark%3A%2F%2Fspark-master:7077
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./spark/jobs:/opt/airflow/spark-jobs
    - ./spark/data:/opt/spark/data
    - ./spark/output:/opt/spark/output
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins

services:

  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_DB: datawarehouse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: fblanco123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
  
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode

  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    environment:
      SPARK_MODE: master
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/data:/opt/spark/data
      - ./spark/output:/opt/spark/output
    
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/data:/opt/spark/data
      - ./spark/output:/opt/spark/output

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      - postgres
    entrypoint: /bin/bash
    command: 
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Fernando \
          --lastname Blanco \
          --role Admin \
          --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    user: "0:0"
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    user: "0:0"
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-webserver
    command: scheduler

volumes:
  postgres_data:
  namenode_data:
  datanode_data:
